<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Marks Entry</title>

  <link rel="stylesheet" href="../../css/style.css">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f4f6f9;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    select, input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      width: 200px;
    }

    table {
      width: 100%;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #4f46e5;
      color: white;
    }

    td, th {
      padding: 12px;
    }

    tr:hover {
      background: #f9fafb;
    }

    .marks-input {
      width: 80px;
    }

  </style>
</head>

<body>

<div class="container">

  <div id="sidebar"></div>

  <div class="main">

    <div id="navbar"></div>

    <!-- Header -->
    <div class="page-header">
      <h2>Marks Feeding Panel</h2>
      <button class="btn" onclick="submitMarks()">Save All</button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <select id="classSelect" onchange="loadSubjects()">
        <option value="">Select Class</option>
      </select>

      <select id="subjectSelect" onchange="loadStudents()">
        <option value="">Select Subject</option>
      </select>
    </div>

    <!-- Table -->
    <table>
      <thead>
        <tr>
          <th>Student Name</th>
          <th>Marks</th>
        </tr>
      </thead>
      <tbody id="studentsTable"></tbody>
    </table>

  </div>
</div>

<script src="../../components/sidebar.js"></script>
<script src="../../components/navbar.js"></script>

<!-- 🔥 IMPORTANT -->
<script src="../../js/teacher/student.js"></script>

</body>
</html>
