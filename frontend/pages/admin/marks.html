<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Marks Entry</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<div class="container">

  <div id="sidebar"></div>

  <div class="main">
    <div id="navbar"></div>

    <h2>Marks Entry</h2>

    <!-- Form -->
    <div class="form-card">
      <select id="studentSelect"></select>
      <select id="subjectSelect"></select>
      <input type="number" id="marks" placeholder="Enter Marks">
      <button onclick="submitMarks()">Save Marks</button>
    </div>

    <!-- Marks Table -->
    <table>
      <thead>
        <tr>
          <th>Student</th>
          <th>Subject</th>
          <th>Marks</th>
        </tr>
      </thead>
      <tbody id="marksTable"></tbody>
    </table>

  </div>
</div>

<script src="../../components/sidebar.js"></script>
<script src="../../components/navbar.js"></script>
<script src="../../js/admin/marks.js"></script>

</body>
</html>
